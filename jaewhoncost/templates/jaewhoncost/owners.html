{% extends 'jaewhoncost/base.html' %}

{% block title %}Owners - Restaurant Management{% endblock %}
{% block page_title %}Owners{% endblock %}

{% block content %}
<div class="card">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h3>👥 Owners List</h3>
        <button class="btn btn-primary" onclick="openOwnerModal()">+ Add Owner</button>
    </div>
    
    <!-- Filters -->
    <div class="filters" style="margin-bottom: 20px;">
        <input type="text" id="searchOwner" placeholder="Search owner name..." class="form-control" style="width: 300px; display: inline-block;">
    </div>
    
    <!-- Owners Table -->
    <table class="data-table" id="owners-table">
        <thead>
            <tr>
                <th>Name</th>
                <th>Phone</th>
                <th>Email</th>
                <th>Branches</th>
                <th>Created</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr><td colspan="6" style="text-align: center;">Loading...</td></tr>
        </tbody>
    </table>
</div>

<!-- Owner Modal -->
<div id="ownerModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeOwnerModal()">&times;</span>
        <h2 id="ownerModalTitle">Add Owner</h2>
        <form id="ownerForm">
            <input type="hidden" id="ownerId">
            
            <div class="form-group">
                <label for="ownerName">Name *</label>
                <input type="text" id="ownerName" required>
            </div>
            
            <div class="form-group">
                <label for="ownerPhone">Phone</label>
                <input type="text" id="ownerPhone">
            </div>
            
            <div class="form-group">
                <label for="ownerEmail">Email</label>
                <input type="email" id="ownerEmail">
            </div>
            
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Save</button>
                <button type="button" class="btn btn-secondary" onclick="closeOwnerModal()">Cancel</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
const API_BASE = window.location.origin + '/api';
let owners = [];

async function loadOwners() {
    try {
        const response = await fetch(`${API_BASE}/owners/`);
        owners = await response.json();
        renderOwners(owners);
    } catch (error) {
        console.error('Error loading owners:', error);
    }
}

function renderOwners(data) {
    const tbody = document.querySelector('#owners-table tbody');
    tbody.innerHTML = '';
    
    const search = document.getElementById('searchOwner').value.toLowerCase();
    const filtered = data.filter(o => 
        o.name.toLowerCase().includes(search) ||
        (o.email && o.email.toLowerCase().includes(search))
    );
    
    if (filtered.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align: center;">No owners found</td></tr>';
        return;
    }
    
    filtered.forEach(owner => {
        const date = new Date(owner.created_at).toLocaleDateString('th-TH');
        const branchCount = owner.branches ? owner.branches.length : 0;
        const row = tbody.insertRow();
        row.innerHTML = `
            <td>${owner.name}</td>
            <td>${owner.phone || '-'}</td>
            <td>${owner.email || '-'}</td>
            <td>${branchCount} branch(es)</td>
            <td>${date}</td>
            <td>
                <button class="btn btn-sm btn-edit edit-btn" data-id="${owner.id}" style="cursor:pointer;">Edit</button>
                <button class="btn btn-sm btn-delete delete-btn" data-id="${owner.id}" style="cursor:pointer;">Delete</button>
            </td>
        `;
    });
}

function openOwnerModal(ownerId = null) {
    const modal = document.getElementById('ownerModal');
    modal.style.display = 'block';
    
    if (ownerId) {
        document.getElementById('ownerModalTitle').textContent = 'Edit Owner';
        const owner = owners.find(o => o.id === ownerId);
        document.getElementById('ownerId').value = owner.id;
        document.getElementById('ownerName').value = owner.name;
        document.getElementById('ownerPhone').value = owner.phone || '';
        document.getElementById('ownerEmail').value = owner.email || '';
    } else {
        document.getElementById('ownerModalTitle').textContent = 'Add Owner';
        document.getElementById('ownerForm').reset();
        document.getElementById('ownerId').value = '';
    }
}

function closeOwnerModal() {
    document.getElementById('ownerModal').style.display = 'none';
}

// Form submission
document.getElementById('ownerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const ownerId = document.getElementById('ownerId').value;
    const data = {
        name: document.getElementById('ownerName').value,
        phone: document.getElementById('ownerPhone').value,
        email: document.getElementById('ownerEmail').value
    };
    
    const method = ownerId ? 'PUT' : 'POST';
    const url = ownerId ? `${API_BASE}/owners/${ownerId}/` : `${API_BASE}/owners/`;
    
    try {
        const response = await fetch(url, {
            method: method,
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': getCookie('csrftoken')
            },
            body: JSON.stringify(data)
        });
        
        if (response.ok) {
            closeOwnerModal();
            loadOwners();
        } else {
            alert('Error saving owner');
        }
    } catch (error) {
        console.error('Error:', error);
        alert('Error saving owner');
    }
});

async function deleteOwner(ownerId) {
    if (!confirm('Delete this owner?')) return;
    
    try {
        const response = await fetch(`${API_BASE}/owners/${ownerId}/`, {
            method: 'DELETE',
            headers: {
                'X-CSRFToken': getCookie('csrftoken')
            }
        });
        
        if (response.ok) {
            loadOwners();
        } else {
            alert('Error deleting owner');
        }
    } catch (error) {
        console.error('Error:', error);
        alert('Error deleting owner');
    }
}

function editOwner(ownerId) {
    openOwnerModal(ownerId);
}

// Search functionality
document.getElementById('searchOwner').addEventListener('input', () => {
    renderOwners(owners);
});

// Get CSRF token
function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}

// Event delegation for edit/delete buttons (iOS Safari fix)
document.querySelector('#owners-table tbody').addEventListener('click', function(e) {
    const editBtn = e.target.closest('.edit-btn');
    if (editBtn) {
        const id = editBtn.getAttribute('data-id');
        editOwner(parseInt(id));
        return;
    }
    const deleteBtn = e.target.closest('.delete-btn');
    if (deleteBtn) {
        const id = deleteBtn.getAttribute('data-id');
        deleteOwner(parseInt(id));
        return;
    }
});

// Initial load
loadOwners();
</script>
{% endblock %}
